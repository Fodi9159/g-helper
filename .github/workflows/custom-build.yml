name: Custom Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout custom branch
        uses: actions/checkout@v4
        with:
          ref: codex/keyboard-only-backlight
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase on upstream
        id: rebase
        continue-on-error: true
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/seerge/g-helper.git || git remote set-url upstream https://github.com/seerge/g-helper.git
          git fetch upstream main
          git rebase upstream/main

      - name: Get conflict info
        if: steps.rebase.outcome == 'failure'
        id: conflicts
        shell: bash
        run: |
          FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "unknown")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify conflict
        if: steps.rebase.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = `${{ steps.conflicts.outputs.files }}`.trim();
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Upstream sync conflict — manual rebase needed',
              body: `Rebase on upstream/main failed. Resolve locally:\n\n` +
                    `\`\`\`bash\ngit fetch upstream\ngit rebase upstream/main\n` +
                    `# resolve conflicts, then:\ngit add .\ngit rebase --continue\ngit push --force-with-lease\n\`\`\`\n\n` +
                    `**Conflicting files:**\n\`\`\`\n${files}\n\`\`\`\n\n` +
                    `Build artifact was **not** published this run.`
            });

      - name: Setup .NET
        if: steps.rebase.outcome == 'success'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish custom G-Helper
        if: steps.rebase.outcome == 'success'
        run: |
          dotnet publish app/GHelper.csproj --configuration Release --runtime win-x64 --self-contained false /p:PublishSingleFile=true

      - name: Upload custom EXE
        if: steps.rebase.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: GHelper-keyboard-only-backlight
          path: app/bin/Release/net8.0-windows/win-x64/publish/GHelper.exe

      - name: Notify sync success
        if: steps.rebase.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.sha }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const upstreamSha = `${{ github.event.head_commit.message || 'N/A' }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync OK — ${sha.substring(0, 7)}`,
              body: `Successfully rebased and built.\n\n` +
                    `Build artifact: [Download here](${runUrl})\n\n` +
                    `No conflicts detected. Custom changes are up to date.`
            });
