name: Custom Build & Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout custom branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase on upstream
        id: rebase
        continue-on-error: true
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/seerge/g-helper.git || git remote set-url upstream https://github.com/seerge/g-helper.git
          git fetch upstream main
          git rebase upstream/main

      - name: Get conflict info
        if: steps.rebase.outcome == 'failure'
        id: conflicts
        shell: bash
        run: |
          FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "unknown")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify conflict
        if: steps.rebase.outcome == 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "unknown")
          gh issue create --repo "${{ github.repository }}" \
            --title "Upstream sync conflict — manual rebase needed" \
            --body "Rebase on upstream/main failed. Resolve locally:

          \`\`\`bash
          git fetch upstream
          git rebase upstream/main
          # resolve conflicts, then:
          git add .
          git rebase --continue
          git push --force-with-lease
          \`\`\`

          **Conflicting files:**
          \`\`\`
          ${FILES}
          \`\`\`

          Build artifact was **not** published this run."

      - name: Check upstream version
        if: steps.rebase.outcome == 'success'
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get latest upstream release tag
          UPSTREAM_TAG=$(curl -s "https://api.github.com/repos/seerge/g-helper/releases/latest" | grep '"tag_name"' | cut -d'"' -f4)
          VERSION="${UPSTREAM_TAG#v}"
          echo "Latest upstream: $UPSTREAM_TAG -> version $VERSION"

          # Check if we already have a release for this version
          OUR_TAGS=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases" | grep '"tag_name"' | cut -d'"' -f4)

          if echo "$OUR_TAGS" | grep -qF "$UPSTREAM_TAG"; then
            echo "Release $UPSTREAM_TAG already exists on fork — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New upstream version: $VERSION"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        if: steps.rebase.outcome == 'success' && steps.version.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Update csproj version
        if: steps.rebase.outcome == 'success' && steps.version.outputs.skip == 'false'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>$VERSION<\/AssemblyVersion>/" app/GHelper.csproj
          sed -i "s/<AssemblyFileVersion>.*<\/AssemblyFileVersion>/<AssemblyFileVersion>$VERSION<\/AssemblyFileVersion>/" app/GHelper.csproj

      - name: Publish
        if: steps.rebase.outcome == 'success' && steps.version.outputs.skip == 'false'
        run: |
          dotnet publish app/GHelper.sln --configuration Release --runtime win-x64 -p:PublishSingleFile=true --no-self-contained

      - name: Create ZIP
        if: steps.rebase.outcome == 'success' && steps.version.outputs.skip == 'false'
        run: |
          powershell Compress-Archive -Path "app/bin/x64/Release/net8.0-windows/win-x64/publish/*" -DestinationPath GHelper.zip -Force

      - name: Create Release
        if: steps.rebase.outcome == 'success' && steps.version.outputs.skip == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Create release and upload zip
          gh release create "$TAG" GHelper.zip \
            --repo "${{ github.repository }}" \
            --title "G-Helper $TAG" \
            --notes "Auto-built from upstream [seerge/g-helper]($TAG) with custom fork patches."

      - name: Push rebased main
        if: steps.rebase.outcome == 'success' && steps.version.outputs.skip == 'false'
        shell: bash
        run: |
          git push --force-with-lease origin main

      - name: Notify sync success
        if: steps.rebase.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main 2>/dev/null || echo "unknown")
          UPSTREAM_SHORT=$(echo $UPSTREAM_SHA | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "${{ steps.version.outputs.skip }}" == "false" ]]; then
            TAG="${{ steps.version.outputs.tag }}"
            MSG="New release **$TAG** created: [Download]($RUN_URL)"
          else
            MSG="No new upstream release — already up to date."
          fi

          gh issue create --repo "${{ github.repository }}" \
            --title "Upstream sync — ${UPSTREAM_SHORT}" \
            --body "Synced with upstream [${UPSTREAM_SHORT}](https://github.com/seerge/g-helper/commit/${UPSTREAM_SHA}).

          ${MSG}

          Build artifact: [View run](${RUN_URL})"
