name: Custom Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout custom branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase on upstream
        id: rebase
        continue-on-error: true
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/seerge/g-helper.git || git remote set-url upstream https://github.com/seerge/g-helper.git
          git fetch upstream main
          git rebase upstream/main

      - name: Get conflict info
        if: steps.rebase.outcome == 'failure'
        id: conflicts
        shell: bash
        run: |
          FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "unknown")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify conflict
        if: steps.rebase.outcome == 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "unknown")
          gh issue create --repo "${{ github.repository }}" \
            --title "Upstream sync conflict — manual rebase needed" \
            --body "Rebase on upstream/main failed. Resolve locally:

          \`\`\`bash
          git fetch upstream
          git rebase upstream/main
          # resolve conflicts, then:
          git add .
          git rebase --continue
          git push --force-with-lease
          \`\`\`

          **Conflicting files:**
          \`\`\`
          ${FILES}
          \`\`\`

          Build artifact was **not** published this run."

      - name: Setup .NET
        if: steps.rebase.outcome == 'success'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish custom G-Helper
        if: steps.rebase.outcome == 'success'
        run: |
          dotnet publish app/GHelper.csproj --configuration Release --runtime win-x64 --self-contained false /p:PublishSingleFile=true

      - name: Upload custom EXE
        if: steps.rebase.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: GHelper-keyboard-only-backlight
          path: app/bin/Release/net8.0-windows/win-x64/publish/GHelper.exe

      - name: Notify sync success
        if: steps.rebase.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          UPSTREAM_SHORT=$(echo $UPSTREAM_SHA | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create --repo "${{ github.repository }}" \
            --title "Upstream sync OK — ${UPSTREAM_SHORT}" \
            --body "Successfully rebased and built on upstream [${UPSTREAM_SHORT}](https://github.com/seerge/g-helper/commit/${UPSTREAM_SHA}).

          Build artifact: [Download here](${RUN_URL})

          No conflicts detected. Custom changes are up to date."
